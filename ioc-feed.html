<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Relics — SecBlog</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .ioc-report-block {}

    .ioc-report-heading {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 1rem 1.5rem;
    }

    .ioc-report-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: color .15s;
    }

    .ioc-report-title:hover {
      color: var(--green);
    }

    .ioc-report-block .ioc-table {
      border: 1px solid var(--border);
      border-top: none;
    }

    .tag-pill {
      margin-bottom: 0 !important;
    }

    #download-csv {
      background: transparent;
      color: #00ff9c;
      border: 2px solid #00ff9c;
      padding: 10px 20px;
      font-size: 14px;
      font-family: monospace;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    /* hover glow */
    #download-csv:hover {
      background: rgba(0, 255, 156, 0.1);
      box-shadow: 0 0 8px #00ff9c, 0 0 16px #00ff9c;
    }

    /* click effect */
    #download-csv:active {
      box-shadow: 0 0 4px #00ff9c;
      transform: scale(0.98);
    }
  </style>
</head>




<body>

  <nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <svg class="icon-open" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <svg class="icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
    <div class="logo">
      <span class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22">
          <path d="M12 2v13M12 2L7 7M12 2l5 5M5 9c0 3 2 5 2 5s-3 0-3 4 3 6 3 6M19 9c0 3-2 5-2 5s3 0 3 4-3 6-3 6"
            stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <div>
        Mr_MaTriX
        <span class="logo-sub">SECBLOG // THREAT RESEARCH</span>
      </div>
    </div>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="reports.html" class="active">Reports</a>
      <a href="APT.html" class="active">APTs</a>
      <a href="ioc-feed.html" class="active">IOCs</a>
      <a href="yara-feed.html" class="active">YARA Rules</a>
      <a href="siem-reference.html" class="active">SIEM Reference</a>
      <a href="malware-structures.html" class="active">Structures</a>
      <a href="achievements.html" class="active">Achievements</a>
      <a href="about.html" class="active">About Me</a>

      <a href="assets/SalahEldin_Kamil_CV.pdf" download class="nav-cta-mobile" style="text-decoration:none;">⬇ CV</a>
    </div>
    <a href="assets/SalahEldin_Kamil_CV.pdf" download class="nav-cta" style="text-decoration:none;">⬇ CV</a>
  </nav>

  <div class="section" style="padding-top:3rem;">
    <div class="section-header">
      <span class="section-title">// IOC FEED</span>
      <div style="display:flex;align-items:center;gap:1rem;">
        <span id="ioc-total" style="font-family:var(--mono);font-size:12px;color:var(--muted);"></span>
        <button class="view-all" id="download-csv" style="cursor:pointer;">download all CSV →</button>
      </div>
    </div>

    <div id="ioc-container"></div>
    <div id="no-iocs"
      style="display:none;padding:3rem 0;text-align:center;font-family:var(--mono);font-size:13px;color:var(--muted);">
      &gt;_ no IOCs yet. Add them inside your report files.</div>
  </div>

  <footer>
    <span>&gt;_ secblog // all findings for educational &amp; defensive use only</span>
    <div class="footer-links" id="footer-links"></div>
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/reports-data.js"></script>
  <script src="assets/js/ioc-page.js"></script>

  <script>
    (function () {
      var btn = document.getElementById('nav-toggle');
      var links = document.querySelector('nav .nav-links');
      if (!btn || !links) return;
      btn.addEventListener('click', function () {
        var isOpen = links.classList.toggle('open');
        btn.classList.toggle('open', isOpen);
        btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });
      links.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () {
          links.classList.remove('open');
          btn.classList.remove('open');
          btn.setAttribute('aria-expanded', 'false');
        });
      });
    })();
  </script>
</body>

</html>
