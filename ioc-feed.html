<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IOC Feed — SecBlog</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    .ioc-report-block {}

    .ioc-report-heading {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 1rem 1.5rem;
    }

    .ioc-report-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: color .15s;
    }

    .ioc-report-title:hover {
      color: var(--green);
    }

    .ioc-report-block .ioc-table {
      border: 1px solid var(--border);
      border-top: none;
    }

    .tag-pill {
      margin-bottom: 0 !important;
    }

    #download-csv {
      background-color: #28a745;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    #download-csv:hover {
      background-color: #218838;
    }

    #download-csv:active {
      transform: scale(0.97);
    }
  </style>
</head>




<body>

  <nav>
    <div class="logo">&gt;_ <span>//</span> SECBLOG</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="reports.html">Reports</a>
      <a href="ioc-feed.html">IOC Feed</a>
      <a href="yara-feed.html">YARA Feed</a>
      <a href="achievements.html">Achievements</a>
      <a href="about.html">About</a>
    </div>
    <a href="assets/SalahEldin_Kamil_CV.pdf" download class="nav-cta" style="text-decoration:none;">⬇ CV</a>
  </nav>

  <div class="section" style="padding-top:3rem;">
    <div class="section-header">
      <span class="section-title">// IOC FEED</span>
      <div style="display:flex;align-items:center;gap:1rem;">
        <span id="ioc-total" style="font-family:var(--mono);font-size:12px;color:var(--muted);"></span>
        <button class="view-all" id="download-csv" style="cursor:pointer;">download all CSV →</button>
      </div>
    </div>

    <div id="ioc-container"></div>
    <div id="no-iocs"
      style="display:none;padding:3rem 0;text-align:center;font-family:var(--mono);font-size:13px;color:var(--muted);">
      &gt;_ no IOCs yet. Add them inside your report files.</div>
  </div>

  <footer>
    <span>&gt;_ secblog // all findings for educational &amp; defensive use only</span>
    <div class="footer-links" id="footer-links"></div>
  </footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/reports-data.js"></script>
  <script src="assets/js/ioc-page.js"></script>
</body>

</html>
