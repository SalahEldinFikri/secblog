<svg viewBox="0 0 1000 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="480" fill="#0b0f19"/>
  <rect x="0" y="0" width="1000" height="480" fill="none" stroke="#1f2d45" stroke-width="2"/>

  <text x="30" y="34" font-family="Courier New, monospace" font-size="12" fill="#64748b" letter-spacing="2">&gt;_ ALIAS_CROSS_REFERENCE.MAP</text>
  <line x1="30" y1="48" x2="970" y2="48" stroke="#1f2d45" stroke-width="1"/>

  <!-- connecting lines from center to each node -->
  <g stroke="#1f2d45" stroke-width="2">
    <line x1="500" y1="240" x2="180" y2="95"/>
    <line x1="500" y1="240" x2="500" y2="90"/>
    <line x1="500" y1="240" x2="820" y2="95"/>
    <line x1="500" y1="240" x2="150" y2="240"/>
    <line x1="500" y1="240" x2="850" y2="240"/>
    <line x1="500" y1="240" x2="180" y2="390"/>
    <line x1="500" y1="240" x2="500" y2="420"/>
    <line x1="500" y1="240" x2="820" y2="390"/>
  </g>

  <!-- center node -->
  <circle cx="500" cy="240" r="70" fill="#111827" stroke="#00ff9d" stroke-width="2"/>
  <text x="500" y="235" font-family="Courier New, monospace" font-size="16" font-weight="700" fill="#00ff9d" text-anchor="middle">LAZARUS</text>
  <text x="500" y="253" font-family="Courier New, monospace" font-size="16" font-weight="700" fill="#00ff9d" text-anchor="middle">GROUP</text>

  <!-- alias nodes -->
  <g font-family="Courier New, monospace" text-anchor="middle">
    <!-- MITRE -->
    <rect x="110" y="70" width="140" height="50" rx="4" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="180" y="90" font-size="10" fill="#64748b">MITRE ATT&amp;CK</text>
    <text x="180" y="107" font-size="13" fill="#38bdf8" font-weight="700">G0032</text>

    <!-- Microsoft -->
    <rect x="430" y="65" width="140" height="50" rx="4" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="500" y="85" font-size="10" fill="#64748b">MICROSOFT</text>
    <text x="500" y="102" font-size="12" fill="#38bdf8" font-weight="700">DIAMOND SLEET</text>

    <!-- CISA -->
    <rect x="750" y="70" width="140" height="50" rx="4" fill="#111827" stroke="#ff4d6d" stroke-width="1.5"/>
    <text x="820" y="90" font-size="10" fill="#64748b">CISA / US GOV</text>
    <text x="820" y="107" font-size="13" fill="#ff4d6d" font-weight="700">HIDDEN COBRA</text>

    <!-- Kaspersky/ESET -->
    <rect x="30" y="215" width="150" height="50" rx="4" fill="#111827" stroke="#00ff9d" stroke-width="1.5"/>
    <text x="105" y="235" font-size="10" fill="#64748b">KASPERSKY / ESET</text>
    <text x="105" y="252" font-size="13" fill="#00ff9d" font-weight="700">LAZARUS</text>

    <!-- CrowdStrike -->
    <rect x="780" y="215" width="160" height="50" rx="4" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="860" y="235" font-size="10" fill="#64748b">CROWDSTRIKE</text>
    <text x="860" y="252" font-size="12" fill="#f59e0b" font-weight="700">LABYRINTH CHOLLIMA</text>

    <!-- Mandiant -->
    <rect x="110" y="360" width="140" height="55" rx="4" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="180" y="380" font-size="10" fill="#64748b">MANDIANT / GTIG</text>
    <text x="180" y="397" font-size="11" fill="#38bdf8" font-weight="700">UNC CLUSTERS</text>

    <!-- APT38 -->
    <rect x="405" y="395" width="190" height="55" rx="4" fill="#111827" stroke="#ff4d6d" stroke-width="1.5"/>
    <text x="500" y="415" font-size="10" fill="#64748b">FINANCIAL SUBCLUSTER</text>
    <text x="500" y="433" font-size="13" fill="#ff4d6d" font-weight="700">APT38</text>

    <!-- Malpedia -->
    <rect x="750" y="360" width="150" height="55" rx="4" fill="#111827" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="825" y="380" font-size="10" fill="#64748b">MALPEDIA</text>
    <text x="825" y="397" font-size="11" fill="#f59e0b" font-weight="700">APT-C-26 / ATK3</text>
  </g>
</svg>
